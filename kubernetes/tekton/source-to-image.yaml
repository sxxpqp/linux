apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: build-maven
  namespace: tekton-pipelines
spec:
  workspaces:
    - name: source
  steps:
    - name: maven
      image: maven:3.5.0-jdk-8-alpine
      workingDir: $(workspaces.source.path)
      command:
        - mvn
      args:
        - clean
        - install
        - -DskipTests
      volumeMounts:
        - name: m2
          mountPath: /root/.m2
  volumes:
    - name: m2
      hostPath:
        path: /home/docker/.m2
