---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-vip
  namespace: kube-system
data:
  # 跟节点网段 172.16.150.0/24 同段，分配池 200-210
  range-global: 172.16.150.200-172.16.150.210
  cidr-global: "24"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-vip
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-vip
rules:
- apiGroups: [""]
  resources: ["services", "services/status", "nodes", "configmaps"]
  verbs: ["get", "list", "watch", "update"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "ingresses/status"]
  verbs: ["get", "list", "watch", "update"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update"]
- apiGroups: [""]
  resources: ["endpoints"]
  verbs: ["get", "list", "watch", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-vip
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-vip
subjects:
- kind: ServiceAccount
  name: kube-vip
  namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-vip
  namespace: kube-system
  labels:
    app: kube-vip
spec:
  selector:
    matchLabels:
      app: kube-vip
  template:
    metadata:
      labels:
        app: kube-vip
    spec:
      serviceAccountName: kube-vip
      hostNetwork: true
      containers:
      - name: kube-vip
        image: registry.cn-hangzhou.aliyuncs.com/sxxpqp/kube-vip:v0.7.2
        args:
        - manager
        env:
        # ARP 模式：响应 VIP 的 ARP 请求，同网段可达
        - name: vip_arp
          value: "true"
        - name: vip_cidr
          value: "24"
        - name: vip_interface
          value: "ens33"
        # 启用 Service LoadBalancer（从 ConfigMap range-global 自动分配 VIP）
        - name: svc_enable
          value: "true"
        - name: svc_election
          value: "true"
        # 禁用控制平面 VIP
        - name: cp_enable
          value: "false"
        volumeMounts:
        - name: config
          mountPath: /etc/kube-vip
      volumes:
      - name: config
        configMap:
          name: kube-vip
