# 组件分工 (两个都要装):
#   1. kube-vip-cloud-provider (Deployment)  → 读下面 ConfigMap 的 range-global,
#      给 LoadBalancer Service 分配 IP, 写 status.loadBalancer.ingress
#   2. kube-vip (DaemonSet)                  → 拿到 IP 后做 ARP 广播 / leader 选举
# 缺任何一个, LB Service 都会卡在 <pending> 或拿不到流量.
---
apiVersion: v1
kind: ConfigMap
metadata:
  # ConfigMap 名字必须叫 "kubevip" (kube-vip-cloud-provider 默认读这个名字),
  # 别改成 kube-vip; 老版本 deploy.yaml 写成 kube-vip 是错的, 池子不会被读到.
  name: kubevip
  namespace: kube-system
data:
  # 跟节点网段 172.16.150.0/24 同段，分配池 200-210
  range-global: 172.16.150.200-172.16.150.210
  cidr-global: "24"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-vip
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-vip
rules:
- apiGroups: [""]
  resources: ["services", "services/status", "nodes", "configmaps"]
  verbs: ["get", "list", "watch", "update"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "ingresses/status"]
  verbs: ["get", "list", "watch", "update"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update"]
- apiGroups: [""]
  resources: ["endpoints"]
  verbs: ["get", "list", "watch", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-vip
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-vip
subjects:
- kind: ServiceAccount
  name: kube-vip
  namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-vip
  namespace: kube-system
  labels:
    app: kube-vip
spec:
  selector:
    matchLabels:
      app: kube-vip
  template:
    metadata:
      labels:
        app: kube-vip
    spec:
      serviceAccountName: kube-vip
      hostNetwork: true
      containers:
      - name: kube-vip
        image: registry.cn-hangzhou.aliyuncs.com/sxxpqp/kube-vip:v0.7.2
        args:
        - manager
        env:
        # ARP 模式：响应 VIP 的 ARP 请求，同网段可达
        - name: vip_arp
          value: "true"
        - name: vip_cidr
          value: "24"
        - name: vip_interface
          value: "ens33"
        # 启用 Service LoadBalancer（从 ConfigMap range-global 自动分配 VIP）
        - name: svc_enable
          value: "true"
        - name: svc_election
          value: "true"
        # 禁用控制平面 VIP
        - name: cp_enable
          value: "false"
        # 配置全部走 env, 不挂 ConfigMap (ConfigMap 是给 cloud-provider 读的)
---
# kube-vip-cloud-provider: 读上面 ConfigMap/kubevip, 给 LoadBalancer Service 分配 IP.
# 缺这个 Deployment, LB Service 会一直 <pending>.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-vip-cloud-controller
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-vip-cloud-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: kube-vip-cloud-controller
  namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-vip-cloud-provider
  namespace: kube-system
  labels:
    app: kube-vip-cloud-provider
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-vip-cloud-provider
  template:
    metadata:
      labels:
        app: kube-vip-cloud-provider
    spec:
      serviceAccountName: kube-vip-cloud-controller
      # 国内拉不到 ghcr.io 时, 把镜像换成自己的镜像源, 比如:
      #   registry.cn-hangzhou.aliyuncs.com/<your-ns>/kube-vip-cloud-provider:v0.0.10
      containers:
      - name: kube-vip-cloud-provider
        image: ghcr.io/kube-vip/kube-vip-cloud-provider:v0.0.10
        imagePullPolicy: IfNotPresent
        command: ["/kube-vip-cloud-provider"]
        args:
        - "--leader-elect-resource-name=kube-vip-cloud-controller"
