apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: observability
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: observability
  labels:
    app: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        args:
          - "server"
          - "/data"
          - "--console-address"
          - ":9001"
        ports:
        - containerPort: 9000
          name: s3
        - containerPort: 9001
          name: console
        env:
        - name: MINIO_ROOT_USER
          value: "minioadmin"
        - name: MINIO_ROOT_PASSWORD
          value: "minioadmin"
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      # - name: data
      #   persistentVolumeClaim:
      #     claimName: minio-pvc
      # 如果没有 PVC，可以用 hostPath（仅测试）：
      - name: data
        hostPath:
          path: /data
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: observability
spec:
  ports:
  - name: s3
    port: 9000
    targetPort: 9000
  - name: console
    port: 9001
    targetPort: 9001
  selector:
    app: minio
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: observability
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: mc
        image: minio/mc:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "等待 MinIO 启动..."
          for i in $(seq 1 30); do
            if mc alias set local http://minio.observability:9000 minioadmin minioadmin 2>/dev/null; then
              echo " MinIO 就绪"
              break
            fi
            echo "  第 ${i} 次重试..."
            sleep 2
          done
          mc mb local/tempo-traces --ignore-existing
          echo "bucket tempo-traces ready"
