adminPassword: "admin123"

service:
  type: NodePort
  nodePort: 30300

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo-query-frontend.observability:3200
        access: proxy
        isDefault: true
        jsonData:
          nodeGraph:
            enabled: true
          tracesToLogs:
            datasourceUid: loki
            filterByTraceID: true
            filterBySpanID: true
            lokiSearch: true
            tags:
              - key: service.name
                value: service_name
              - key: service.namespace
                value: service_namespace
              - key: deployment.environment
                value: deployment_environment_name
          tracesToMetrics:
            datasourceUid: prometheus
            queries:
              - name: "Request Rate"
                query: 'rate(traces_spanmetrics_calls_total{service_name="${__tags{service.name}}"}[5m])'
          serviceMap:
            datasourceUid: prometheus
          lokiSearch:
            datasourceUid: loki
      - name: Loki
        type: loki
        uid: loki
        url: http://loki-gateway.monitoring.svc:80
        access: proxy
        jsonData:
          derivedFields:
            - name: trace_id
              matcherRegex: '"trace_id":"([a-f0-9]{32})"'
              url: "${__value.raw}"
              datasourceUid: tempo
              urlDisplayLabel: "View in Tempo"
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090
        access: proxy
        jsonData:
          exemplarTraceIdDestinations:
            - name: traceID
              datasourceUid: tempo