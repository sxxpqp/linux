adminPassword: "admin123"
service:
  type: NodePort
  nodePort: 30300

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo-query-frontend.observability:3200
        access: proxy
        isDefault: true
        jsonData:
          nodeGraph:
            enabled: true
          tracesToLogs:
            datasourceUid: loki
            filterByTraceID: true
            filterBySpanID: true
          tracesToMetrics:
            datasourceUid: prometheus
            queries:
              - name: "Request Rate"
                query: 'rate(traces_spanmetrics_calls_total{service="$__tags{service}"}[5m])'
          serviceMap:
            datasourceUid: prometheus

      - name: Loki
        type: loki
        uid: loki
        url: http://loki-gateway.monitoring.svc:80
        access: proxy
        jsonData:
          derivedFields:
            - name: TraceID
              matcherRegex: '(?i)trace[_-]?id[":\\s]+([a-f0-9]{32})'
              url: '$${__value.raw}'
              datasourceUid: tempo

      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090
        access: proxy
        jsonData:
          exemplarTraceIdDestinations:
            - name: traceID
              datasourceUid: tempo
