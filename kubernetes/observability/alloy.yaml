---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: observability
data:
  config.alloy: |
    // 1. 接收端：OTLP（来自 OTel SDK + Beyla）
    otelcol.receiver.otlp "default" {
      grpc { endpoint = "0.0.0.0:4317" }
      http { endpoint = "0.0.0.0:4318" }
      output {
        traces = [
          otelcol.connector.servicegraph.default.input,
          otelcol.connector.spanmetrics.default.input,
          otelcol.processor.batch.traces.input,
        ]
      }
    }

    // 2. 连接器：服务拓扑图
    otelcol.connector.servicegraph "default" {
      dimensions = ["http.method", "http.status_code"]
      output {
        metrics = [otelcol.processor.batch.metrics.input]
      }
    }

    // 3. 连接器：RED 指标（QPS/错误率/P99）
    otelcol.connector.spanmetrics "default" {
      histogram { explicit {} }
      output {
        metrics = [otelcol.processor.batch.metrics.input]
      }
    }

    // 4. 批处理
    otelcol.processor.batch "traces" {
      send_batch_size = 512
      timeout         = "5s"
      output {
        traces = [otelcol.exporter.otlp.tempo.input]
      }
    }

    otelcol.processor.batch "metrics" {
      send_batch_size = 512
      timeout         = "5s"
      output {
        metrics = [otelcol.exporter.prometheus.default.input]
      }
    }

    // 5. 导出：Tempo Distributor（OTLP Trace 接收端）
    otelcol.exporter.otlp "tempo" {
      client {
        endpoint = "tempo-distributor.observability:4317"
        tls { insecure = true }
      }
    }

    // 6. 导出：Prometheus remote write（指标存储）
    otelcol.exporter.prometheus "default" {
      forward_to = [prometheus.remote_write.default.receiver]
    }

    prometheus.remote_write "default" {
      endpoint {
        url = "http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090/api/v1/write"
      }
    }

    // 7. 日志采集：宿主机容器日志 → Loki
    loki.source.file "container_logs" {
      targets = [{
        __path__ = "/var/log/pods/*/*/*.log",
        job      = "kubernetes-pods",
      }]
      forward_to = [loki.process.labels.receiver]
    }

    // 8. 日志标签提取（CRI 格式解析 → namespace/pod/container）
    loki.process "labels" {
      stage.cri {}
      stage.regex {
        expression = "/var/log/pods/(?P<namespace>[^_]+)_(?P<pod>[^_]+)_[^/]+/(?P<container>[^/]+)/"
      }
      stage.labels {
        values = {
          namespace = "",
          pod       = "",
          container = "",
        }
      }
      forward_to = [loki.write.default.receiver]
    }

    // 9. 写入 Loki Gateway
    loki.write "default" {
      endpoint {
        url = "http://loki-gateway.monitoring.svc:80/loki/api/v1/push"
      }
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: alloy
  namespace: observability
spec:
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      containers:
      - name: alloy
        image: grafana/alloy:latest
        args:
          - "run"
          - "/etc/alloy/config.alloy"
        ports:
        - containerPort: 4317
          hostPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          hostPort: 4318
          name: otlp-http
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: config
          mountPath: /etc/alloy
        - name: varlog
          mountPath: /var/log
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: alloy-config
      - name: varlog
        hostPath:
          path: /var/log
---
apiVersion: v1
kind: Service
metadata:
  name: alloy
  namespace: observability
spec:
  selector:
    app: alloy
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: otlp-http
    port: 4318
    targetPort: 4318
