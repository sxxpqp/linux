# 测试 Demo 应用 — Go / Python / Java
# Beyla eBPF 自动发现 default namespace 下的 Service，零配置
#
# === Go ===
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-demo
  labels:
    app: otel-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: otel-demo
  template:
    metadata:
      labels:
        app: otel-demo
      annotations:
        # Go 不支持自动注入，这个注解不需要
    spec:
      containers:
        - name: app
          image: registry.cn-hangzhou.aliyuncs.com/sxxpqp/otel-demo:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://$(NODE_IP):4318"
            - name: ENVIRONMENT
              value: "production"
            - name: OTEL_SERVICE_NAME
              value: "otel-demo"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment=production,service.version=1.0.0"
            # K8s metadata for structured logging
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_POD
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: K8S_NODE
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: otel-demo
  labels:
    app: otel-demo
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: otel-demo
---
# === Java (Spring Boot) ===
apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-hello
  namespace: default
  labels:
    app: java-hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-hello
  template:
    metadata:
      labels:
        app: java-hello
    spec:
      containers:
      - name: app
        image: mononoke/spring-boot-hello:29
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: java-hello
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  selector:
    app: java-hello
---
# === Python (Flask) ===
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-hello
  namespace: default
  labels:
    app: python-hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-hello
  template:
    metadata:
      labels:
        app: python-hello
    spec:
      containers:
      - name: app
        image: margaritamedel/python-hello:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: python-hello
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 5000
    name: http
  selector:
    app: python-hello

# ---
# kubectl 快速命令：
#   kubectl create deployment go-hello     --image=registry.cn-hangzhou.aliyuncs.com/sxxpqp/otel-demo:latest
#   kubectl expose deployment go-hello     --port=8080 --target-port=8080
#   kubectl create deployment java-hello   --image=mononoke/spring-boot-hello:29
#   kubectl expose deployment java-hello   --port=8000 --target-port=8000
#   kubectl create deployment python-hello --image=margaritamedel/python-hello:latest
#   kubectl expose deployment python-hello --port=5000 --target-port=5000
