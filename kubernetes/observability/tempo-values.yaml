# Tempo 高可用配置（生产环境）
# 使用方式：helm install tempo grafana/tempo-distributed -n observability --values tempo-values.yaml

# 启用 metrics-generator 组件
metricsGenerator:
  enabled: true
  replicas: 1
  config:
    processor:
      span_metrics: {}
      service_graphs: {}
      # local-blocks 默认会把最近的 trace 块写到内存 + 本地盘
      # 启用后可供 TraceQL metrics 查询（count_over_time、rate 等）
      local_blocks:
        # 把完成的块也 flush 到长期存储（让历史查询也能命中）
        flush_to_storage: true
    storage:
      # HA 双推：每个 Prometheus pod 都写一份，避免 Service round-robin 命中单 pod
      remote_write:
      - url: http://prometheus-k8s-0.prometheus-operated.monitoring.svc:9090/api/v1/write
        send_exemplars: true
      - url: http://prometheus-k8s-1.prometheus-operated.monitoring.svc:9090/api/v1/write
        send_exemplars: true
    registry:
      collection_interval: 30s
  # local-blocks 需要本地临时存储（默认 emptyDir 也行，生产可换 PVC）
  persistence:
    enabled: false

# tempo-distributed chart 1.61.x 的租户 override 渲染入口
# chart 模板读的是顶层 overrides.defaults（不是 global_overrides，那是更老版本的 key）
# 该配置写到 tempo-runtime ConfigMap 的 overrides.yaml，Tempo metrics-generator
# 必须在这里启用 processors，否则不会处理任何 span
overrides:
  defaults:
    metrics_generator:
      generate_native_histograms: classic
      processors:
        - service-graphs   # 服务依赖拓扑图
        - span-metrics     # RED 指标（rate / errors / duration）
        - local-blocks     # TraceQL metrics: rate(), count_over_time(), quantile_over_time()

# 各组件副本数
ingester:
  replicas: 3
  config:
    lifecycler:
      ring:
        replication_factor: 3

distributor:
  replicas: 2
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

querier:
  replicas: 2

queryFrontend:
  replicas: 2

compactor:
  replicas: 1

# chart 级别控制 Service 端口
traces:
  otlp:
    grpc:
      enabled: true
      receiverConfig:
        endpoint: 0.0.0.0:4317
    http:
      enabled: true
      receiverConfig:
        endpoint: 0.0.0.0:4318

# Tempo 核心配置
tempo:
  config: |
    memberlist:
      cluster_label: "tempo.observability"
    multitenancy_enabled: false
    usage_report:
      reporting_enabled: true
    compactor:
      compaction:
        block_retention: 24h
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    ingester: {}
    server:
      http_listen_port: 3200
    storage:
      trace:
        backend: s3
        local:
          path: /var/tempo/traces
        s3:
          access_key: minioadmin
          bucket: tempo-traces
          endpoint: minio.observability:9000
          insecure: true
          secret_key: minioadmin
        wal:
          path: /var/tempo/wal
    querier: {}
    query_frontend: {}

# MinIO 存储配置
storage:
  trace:
    backend: s3
    s3:
      access_key: minioadmin
      secret_key: minioadmin
      bucket: tempo-traces
      endpoint: minio.observability:9000
      insecure: true

# 服务类型
service:
  type: ClusterIP
