# Tempo 高可用配置（生产环境）
# 使用方式：helm install tempo grafana/tempo -n observability --values tempo-values.yaml

tempo:
  replicas: 3

  storage:
    trace:
      backend: s3
      s3:
        bucket: tempo-traces
        endpoint: minio.observability:9000
        access_key: minioadmin
        secret_key: minioadmin
        insecure: true
      wal:
        path: /var/tempo/wal

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  metrics_generator:
    enabled: true
    processor:
      span_metrics:
        enabled: true
      service_graphs:
        enabled: true
    storage:
      path: /var/tempo/generator_wal
    registry:
      collection_interval: 30s

overrides:
  defaults:
    metrics_generator:
      generate_on_adjust: true
      processors:
      - span-metrics
      - service-graphs

service:
  type: ClusterIP
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: http
      port: 3200
      targetPort: 3200
