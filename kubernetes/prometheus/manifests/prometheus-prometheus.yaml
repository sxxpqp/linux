apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  labels:
    app.kubernetes.io/component: prometheus
    app.kubernetes.io/instance: k8s
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: kube-prometheus
    app.kubernetes.io/version: 3.11.3
  name: k8s
  namespace: monitoring
spec:
  alerting:
    alertmanagers:
    - apiVersion: v2
      name: alertmanager-main
      namespace: monitoring
      port: web
  
  # 🎯 核心修正 1：利用官方特性开关在启动参数中激活 otlp-receiver 接收口
  enableFeatures:
    - otlp-receiver

  # 🎯 核心修正 2：利用 inline 语法，将 3.x 官方标准的 otlp 配置无缝揉进最终生成的 prometheus.yml 中
  # 这样既能绕过旧版本 CRD 的字段校验错误，又符合 Prometheus 3.x 只能将 OTLP 配置写在文件里的官方规范
  extraConfigFile: |
    otlp:
      translation_strategy: "prefer-resource-attributes"
      resource_attributes:
        - service.name
        - service.namespace
        - deployment.environment.name
        - service.version
        - k8s.cluster.name
        - k8s.namespace.name
        - k8s.pod.name

  externalLabels: {}
  image: quay.io/prometheus/prometheus:v3.11.3
  nodeSelector:
    kubernetes.io/os: linux
  podMetadata:
    labels:
      app.kubernetes.io/component: prometheus
      app.kubernetes.io/instance: k8s
      app.kubernetes.io/name: prometheus
      app.kubernetes.io/part-of: kube-prometheus
      app.kubernetes.io/version: 3.11.3
  podMonitorNamespaceSelector: {}
  podMonitorSelector: {}
  probeNamespaceSelector: {}
  probeSelector: {}
  replicas: 2
  resources:
    requests:
      memory: 400Mi
  ruleNamespaceSelector: {}
  ruleSelector: {}
  scrapeConfigNamespaceSelector: {}
  scrapeConfigSelector: {}
  securityContext:
    fsGroup: 2000
    runAsNonRoot: true
    runAsUser: 1000
  serviceAccountName: prometheus-k8s
  serviceDiscoveryRole: EndpointSlice
  serviceMonitorNamespaceSelector: {}
  serviceMonitorSelector: {}
  version: 3.11.3
