apiVersion: monitoring.coreos.com/v1
kind: Prometheus
metadata:
  labels:
    app.kubernetes.io/component: prometheus
    app.kubernetes.io/instance: k8s
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: kube-prometheus
    app.kubernetes.io/version: 3.11.3
  name: k8s
  namespace: monitoring
spec:
  alerting:
    alertmanagers:
    - apiVersion: v2
      name: alertmanager-main
      namespace: monitoring
      port: web
  
  # 🎯 核心修正 1：利用官方提供的内置特征开关激活 otlp 接收器
  enableFeatures:
    - otlp-receiver

  # 🎯 核心修正 2：利用 additionalArgs 把 OTLP 的资源属性提升直接作为启动 Flag 强行喂给容器
  # 这样可以完美绕过你集群内旧版本 CRD 的字段合法性检查（Strict Decoding Error）
  additionalArgs:
    - name: "otlp.translation-strategy"
      value: "prefer-resource-attributes"
    - name: "otlp.resource-attributes"
      value: "service.name,service.namespace,deployment.environment.name,service.version,k8s.cluster.name,k8s.namespace.name,k8s.pod.name"

  externalLabels: {}
  image: quay.io/prometheus/prometheus:v3.11.3
  nodeSelector:
    kubernetes.io/os: linux
  podMetadata:
    labels:
      app.kubernetes.io/component: prometheus
      app.kubernetes.io/instance: k8s
      app.kubernetes.io/name: prometheus
      app.kubernetes.io/part-of: kube-prometheus
      app.kubernetes.io/version: 3.11.3
  podMonitorNamespaceSelector: {}
  podMonitorSelector: {}
  probeNamespaceSelector: {}
  probeSelector: {}
  replicas: 2
  resources:
    requests:
      memory: 400Mi
  ruleNamespaceSelector: {}
  ruleSelector: {}
  scrapeConfigNamespaceSelector: {}
  scrapeConfigSelector: {}
  securityContext:
    fsGroup: 2000
    runAsNonRoot: true
    runAsUser: 1000
  serviceAccountName: prometheus-k8s
  serviceDiscoveryRole: EndpointSlice
  serviceMonitorNamespaceSelector: {}
  serviceMonitorSelector: {}
  version: 3.11.3
