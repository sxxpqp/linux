# ============================================================
# 示例 1: 基础 Ingress + TLS
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-nginx
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: ngdemo.sxxpqp.top
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: my-nginx
                port:
                  number: 80
  tls:
    - hosts:
        - ngdemo.sxxpqp.top
      secretName: test-ngdemo
---
# ============================================================
# 示例 2: 多路径 rewrite(生产级, ip-path-example 简化版)
# /api → uc-api-svc, /monitor → omvision-api-svc
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multi-path-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: uc-api-svc
                port:
                  number: 8103
          - path: /monitor(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: omvision-api-svc
                port:
                  number: 8081