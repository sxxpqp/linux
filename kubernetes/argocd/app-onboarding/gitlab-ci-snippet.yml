# GitLab CI — update-manifest stage 片段
#
# 这是一个 stage 片段,不是完整 .gitlab-ci.yml。
# 把这段拷到你项目的 .gitlab-ci.yml,放在 build-image 之后(GitOps push-back 模式)。
#
# 完整一份 vue3-demo 实战示例见:
#   D:\code\vue3-demo\.gitlab-ci.yml(对照该项目阅读最易理解)
#
# ═════════════════════════════════════════════════════════════════
# 模式说明:CI 不直接 kubectl 部署,只改 git 里 k8s/deployment.yaml 的 image tag,
# 然后 push 回 master,ArgoCD 监听到 commit 自动 sync 集群。这是 ArgoCD GitOps 标准做法。
# ═════════════════════════════════════════════════════════════════

# ───────────────────────────────────────
# 顶部 variables(片段)
# ───────────────────────────────────────
# variables:
#   APP_NAME: myapp
#   HARBOR_REGISTRY: hub.wishfoxs.com:6443
#   HARBOR_PROJECT: library
#   # IMAGE_TAG 双轨策略:默认 branch-sha,job 级 rules:variables 在 tag pipeline 时 override 成 git tag
#   # ⚠ 不要写 "${CI_COMMIT_TAG:-${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}}",
#   #    GitLab CI variables 段不解析 bash 默认值语法,结果是空字符串(踩过坑)
#   IMAGE_TAG: "${CI_COMMIT_REF_SLUG}-${CI_COMMIT_SHORT_SHA}"
#   IMAGE_NAME: "${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${APP_NAME}:${IMAGE_TAG}"

# ───────────────────────────────────────
# build-image 段(片段)
# ───────────────────────────────────────
# build-image:
#   stage: image
