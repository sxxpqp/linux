
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: etcd-backup
  namespace: devops-tools
  labels:
    app: etcd-backup
  annotations: {}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etcd-backup
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: etcd-backup
      annotations:
        kubectl.kubernetes.io/restartedAt: '2026-03-07T18:11:42+08:00'
    spec:
      volumes:
        - name: etcd-certs
          secret:
            secretName: etcd-backup-certs
            defaultMode: 384
        - name: backup-tmp
          emptyDir: {}
      containers:
        - name: etcd-backup
          image: 'registry.cn-hangzhou.aliyuncs.com/sxxpqp/backup-etcd:latest'
          envFrom:
            - configMapRef:
                name: etcd-backup-config
            - secretRef:
                name: etcd-backup-s3-creds
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - name: etcd-certs
              readOnly: true
              mountPath: /etc/etcd-certs
            - name: backup-tmp
              mountPath: /data
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: IfNotPresent
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
  strategy:
    type: Recreate
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600

---
kind: ConfigMap
apiVersion: v1
metadata:
  name: etcd-backup-config
  namespace: devops-tools
  labels:
    app: etcd-backup
data:
  CRON_SCHEDULE: 0 * * * *
  ETCD_CA: /etc/etcd-certs/ca.crt
  ETCD_CERT: /etc/etcd-certs/server.crt
  ETCD_ENDPOINTS: 'https://192.168.100.10:2379'
  ETCD_KEY: /etc/etcd-certs/server.key
  S3_BACKUP_PATH: backup/etcd
  S3_BUCKET: idc-databackup
  S3_ENDPOINT: 'http://192.168.100.101:8060'
  TZ: Asia/Shanghai

---
kind: Secret
apiVersion: v1
metadata:
  name: etcd-backup-s3-creds
  namespace: devops-tools
  labels:
    app: etcd-backup
data:
  S3_ACCESS_KEY: b3hlem1zajZnenkzcDJteDdhbXA=
  S3_SECRET_KEY: bWQ1YmEyMWZzeHd3Yjh3MjVkMHhtbTYzMndqaDlwanBxc3o0bXFuaQ==
type: Opaque

---
kind: Secret
apiVersion: v1
metadata:
  name: etcd-backup-certs
  namespace: devops-tools
  labels:
    app: etcd-backup
data:
  ca.crt: >-
    
  server.crt: >-
    
  server.key: >-
    
type: Opaque

