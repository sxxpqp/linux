# KubeBlocks MySQL — 半同步主从模式 (1 主 + 2 从, 共 3 节点)
#
# 选型对比 (两个子目录二选一):
#   semisync (本目录)  社区 MySQL + 半同步, KubeBlocks operator 监控选主
#                      → 兼容性最好, 工具链全 (canal/binlog/DTS), 生产首选
#   paxos    (../paxos) apecloud-mysql (WeSQL), 内置 Paxos 多数派, 节点内选主
#                      → 强一致, 适合金融/对一致性敏感场景
#
# 拓扑: 单 Component, replicas=3, KubeBlocks 自动选举 primary/secondary
#
# componentDef 前缀写法:
#   mysql-8.0  → 自动选 mysql-8.0-* 里最新的
#   mysql-5.7  → MySQL 5.7.x
#
# HA 说明:
#   - KubeBlocks operator 监控 primary 健康, 宕机后自动 failover 到 secondary
#   - 写入走 mysql-cluster-mysql 的主节点 VIP (KubeBlocks 自动维护 primary endpoint)
#   - 读取可连任意副本 (headless service 做 round-robin)
#
# 扩缩容: bash scale.sh 5

apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: mysql-cluster
  namespace: test
spec:
  terminationPolicy: Delete
  # terminationPolicy 说明:
  #   DoNotTerminate  拒绝删除 (生产推荐)
  #   Delete          删 K8s 资源 + PVC (数据丢失)
  #   WipeOut         Delete + 删远程备份

  componentSpecs:
    - name: mysql
      componentDef: mysql-8.0        # 前缀, 自动匹配最新 mysql-8.0-*
      serviceVersion: "8.0.33"       # 可选: 8.0.30 / 8.0.33 / 8.0.35

      replicas: 3                    # 1 primary + 2 secondary

      # ===== 固定密码 (引用外部 Secret) =====
      # ⚠ Secret 必须先于 Cluster 创建 (install.sh 已处理)
      # 包含 username=root + password 两个 key
      systemAccounts:
        - name: root
          secretRef:
            name: mysql-cluster-password
            namespace: test

      resources:
        limits:
          cpu: "2"
          memory: 4Gi
        requests:
          cpu: 500m
          memory: 1Gi

      volumeClaimTemplates:
        - name: data
          spec:
            accessModes: [ ReadWriteOnce ]
            # storageClassName: longhorn   # 生产建议用 longhorn, 测试留空用默认 SC
            resources:
              requests:
                storage: 50Gi

  # 反亲和: 3 个 pod 尽量分到不同节点
  schedulingPolicy:
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: mysql-cluster
