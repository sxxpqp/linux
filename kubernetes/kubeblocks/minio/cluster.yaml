# KubeBlocks MinIO Cluster (分布式模式, 8 节点)
#
# 设计要点:
#   - 8 节点 1 个 Server Pool, EC:4 默认 (损 4 块盘内仍可读写)
#   - 每节点 1Ti 数据盘, 总裸容量 8Ti, EC 后有效 ≈ 4Ti
#   - MinIO 扩容不能改 replicas, 只能 "再加一个 pool" (再开一个 Cluster 同集群联邦, 或用 admin 命令)
#   - S3 API 9000 走 ClusterIP (集群内业务用)
#   - Console UI 9001 通过同目录 console-service.yaml 暴露为 LoadBalancer (走 metallb)
apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: minio-cluster
  namespace: test
spec:
  terminationPolicy: Delete

  clusterDef: minio

  componentSpecs:
    - name: minio
      replicas: 8

      resources:
        limits:
          cpu: "4"
          memory: 8Gi
        requests:
          cpu: 500m
          memory: 2Gi

      volumeClaimTemplates:
        - name: data
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Ti

  # 反亲和: 8 个 broker 尽量分散到不同节点 (节点数不够时按权重退化)
  schedulingPolicy:
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: minio-cluster
