# MinIO Console (管理 UI, 端口 9001) 走 LoadBalancer 暴露
# 走 metallb 分配的 IP. 想关掉外部访问 (只走 ClusterIP) 把 type 改成 ClusterIP 就行.
#
# 选择器对应 Bitnami minio chart 的 pod 标签.
# __RELEASE_NAME__ 由 install.sh 在 apply 时替换 (默认 minio-cluster).
apiVersion: v1
kind: Service
metadata:
  name: __RELEASE_NAME__-console
  namespace: test
  labels:
    app.kubernetes.io/managed-by: install-script
    app.kubernetes.io/component: minio-console-lb
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: minio
    app.kubernetes.io/instance: __RELEASE_NAME__
  ports:
    - name: console
      port: 9001
      targetPort: 9001
      protocol: TCP
  externalTrafficPolicy: Cluster
