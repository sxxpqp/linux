# KubeBlocks Redis Cluster 实例 (v1.0.2 API)
#
# v1.0 API 选型说明:
#   两条互斥的路径:
#   - 路 A: clusterDefinitionRef + topology -> 由 ClusterDefinition 自动派生 component
#           (不能手动写 componentDef)
#   - 路 B: 直接 componentSpecs[].componentDef -> 跳过 ClusterDefinition 抽象, 更灵活
#   本文件用路 B (实测 v1.0.2 操作员路 A 的 component 派生有 bug, PreCheckFailed).
#
# 可用 ComponentDefinition (kubectl get cd | grep redis):
#   redis-cluster-8-1.0.2  -> Redis 8.2.2 cluster 模式 (最新, 当前选用)
#   redis-cluster-7-1.0.2  -> Redis 7.2.11
#   redis-cluster-6-1.0.2  -> Redis 6.2.17
#   redis-cluster-5-1.0.2  -> Redis 5.0.12
#
# 用法:
#   bash install.sh           # 应用本 CR
#   bash scale.sh 9           # 扩容到 9 副本
#   bash uninstall.sh         # 删除

apiVersion: apps.kubeblocks.io/v1alpha1
kind: Cluster
metadata:
  name: redis-cluster
  namespace: test
spec:
  # 删除策略
  # - DoNotTerminate: 拒绝删除 (生产推荐)
  # - Halt:           删 K8s 资源但保留 PVC
  # - Delete:         删 K8s 资源 + PVC (数据丢失)
  # - WipeOut:        Delete + 删远程备份
  terminationPolicy: Delete

  componentSpecs:
    - name: redis-cluster
      componentDef: redis-cluster-8-1.0.2    # Redis 8.2.2 cluster 模式
      serviceVersion: 8.2.2
      replicas: 6                             # 3 主 + 3 从, 最小可用 cluster
      disableExporter: false                  # 启用 redis_exporter 边车 :9121

      # 资源限制
      resources:
        limits:
          cpu: "1"
          memory: 2Gi
        requests:
          cpu: 100m
          memory: 512Mi

      # 持久化 (每个 pod 一份)
      # storageClassName 不写 = 用集群默认 SC; 也可显式指定 longhorn / local-path 等
      volumeClaimTemplates:
        - name: data
          spec:
            # storageClassName: longhorn
            accessModes: [ ReadWriteOnce ]
            resources:
              requests:
                storage: 10Gi

  # ---------- 反亲和: 各副本尽量打散到不同节点 ----------
  # v1.0 用 schedulingPolicy 替代废弃的 affinity
  schedulingPolicy:
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: redis-cluster
                  apps.kubeblocks.io/component-name: redis-cluster
