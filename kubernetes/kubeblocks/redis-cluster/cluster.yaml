# KubeBlocks Redis Sharding Cluster (官方 v1 API)
#
# 拓扑: 3 个分片, 每分片 1 master + 1 replica = 共 6 pod
# 槽位分配: KubeBlocks 自动让 3 个 master 各分 ~5461 个槽位 (合 16384)
#
# 解决 Bitnami 的 IP 切换问题:
#   - InstanceSet 替代 StatefulSet, 每副本独立稳定的 DNS 名
#   - cluster-announce-ip 用 DNS 而非 Pod IP, 重启 IP 变也不影响拓扑
#   - reload hook 自动让 Redis 更新 nodes.conf
#
# componentDef 前缀写法:
#   redis-cluster-7  -> KubeBlocks 自动选 redis-cluster-7-* 里最新的 (现在是 -1.0.2)
#   redis-cluster-8  -> Redis 8.x
# 写带版本号 (redis-cluster-7-1.0.2) 也行, 但锁死了升级路径.
#
# 扩缩容: 改 shards 数 (bash scale.sh 4)

apiVersion: apps.kubeblocks.io/v1
kind: Cluster
metadata:
  name: redis-cluster
  namespace: test
spec:
  # 删除策略
  # - DoNotTerminate: 拒绝删除 (生产推荐)
  # - Delete:         删 K8s 资源 + PVC (默认, 数据丢失)
  # - WipeOut:        Delete + 删远程备份
  terminationPolicy: Delete

  shardings:
    - name: shard                    # 分片名前缀, 实际 component 名是 shard-<随机后缀>
      shards: 3                      # 分片数 (至少 3, Redis Cluster 选举 quorum 要求)

      template:
        name: redis                  # 模板里这个 name 会被忽略, 用 shardings.name 替代
        componentDef: redis-cluster-7   # 前缀, 自动匹配最新 redis-cluster-7-*
        serviceVersion: "7.2.4"      # Redis 内核版本, 可选 7.0.6 / 7.2.4 / 7.2.11
        disableExporter: false       # 启用 redis_exporter 边车 :9121
        replicas: 2                  # 每分片 2 副本 (1 master + 1 replica)

        # ===== 固定密码 (引用外部 Secret) =====
        # 不写这一段则 KubeBlocks 自动生成随机密码, secret 名带 shard 后缀难记.
        # 写了就所有 shard 共用同一个 Secret 里的 password.
        # 先建 Secret (参考 install.sh 自动创建):
        #   kubectl create secret generic redis-cluster-password -n test \
        #     --from-literal=password='YourStrongPass123'
        # systemAccounts:
        #   - name: default            # Redis 的 requirepass 账号
        #     secretRef:
        #       name: redis-cluster-password
        #       namespace: test

        resources:
          limits:
            cpu: "1"
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 512Mi

        # 每副本一份持久化
        volumeClaimTemplates:
          - name: data
            spec:
              # 不写 storageClassName 用集群默认 SC, 显式写更明确
              # storageClassName: longhorn
              accessModes: [ ReadWriteOnce ]
              resources:
                requests:
                  storage: 10Gi

        # ===== 外部访问 (默认关闭) =====
        # KubeBlocks v1.0.2 的 NodePort + announce-ip 在 master/slave 配置不一致
        # (master 用 NodeIP+NodePort, slave 用 Pod IP), 导致 redis-cli -c 跟 MOVED
        # 跳转时报 "?:31573 Name does not resolve". 业务用 Lettuce/go-redis 等
        # cluster client 没这问题, 但要从集群外用 GUI 工具会卡.
        #
        # 如果只要集群内连接 (推荐), 留空注释着, 所有 pod 一致用 Pod IP, 内部直通.
        # 如果确实需要 NodePort 外部访问, 取消下面注释, 但要换 RedisInsight 这种
        # 兼容性好的客户端 (Navicat 不行).
        # services:
        #   - name: redis-advertised
        #     podService: true
        #     serviceType: NodePort

  # 反亲和: 各副本尽量打散到不同节点
  schedulingPolicy:
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: redis-cluster
