# Kafka UI - 开源 Web GUI, 集群内直连 broker 自动发现拓扑.
#
# 用法:
#   kubectl apply -f kafka-ui.yaml
#
# 访问: http://<任一 node IP>:30780
# 首次打开自动连 bootstrap server, 无需手动配.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: test
  labels:
    app: kafka-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: kafka-cluster
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: kafka-cluster-kafka-combine-headless.test.svc:9092
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: test
spec:
  selector:
    app: kafka-ui
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30780
      protocol: TCP
  type: NodePort
