apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarqube-postgres
  namespace: devops-tools
  labels:
    app: sonarqube-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarqube-postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: sonarqube-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:latest
        imagePullPolicy: Always
        env:
        - name: POSTGRES_USER
          value: sonar
        - name: POSTGRES_PASSWORD
          value: sonar123
        - name: POSTGRES_DB
          value: sonarqube
        - name: POSTGRES_INITDB_ARGS
          value: '--set huge_pages=off'
        ports:
        - containerPort: 5432
          protocol: TCP
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "sonar", "-d", "sonarqube"]
          initialDelaySeconds: 20
          periodSeconds: 5
          failureThreshold: 6
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "sonar", "-d", "sonarqube"]
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 3
      volumes:
      - name: pgdata
        persistentVolumeClaim:
          claimName: sonarqube-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: sonarqube-postgres
  namespace: devops-tools
spec:
  selector:
    app: sonarqube-postgres
  ports:
  - name: postgres
    port: 5432
    targetPort: 5432
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sonarqube-postgres-pvc
  namespace: devops-tools
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi