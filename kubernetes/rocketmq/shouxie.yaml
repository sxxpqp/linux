  name: rocketmq-dashboard
  namespace: middleware
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rocketmq-dashboard
  template:
    metadata:
      labels:
        app: rocketmq-dashboard
    spec:
      containers:
        - name: dashboard
          image: hub.wishfoxs.com:6443/middleware/rocketmq-dashboard:2.0.0
          imagePullPolicy: IfNotPresent
          env:
            - name: JAVA_OPTS
              value: "-Drocketmq.namesrv.addr=namesrv-0.namesrv-headless.middleware.svc.cluster.local:9876;namesrv-1.namesrv-headless.middleware.svc.cluster.local:9876;namesrv-2.namesrv-headless.middleware.svc.cluster.local:9876"
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-dashboard
  namespace: middleware
spec:
  type: NodePort
  selector:
    app: rocketmq-dashboard
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30880



