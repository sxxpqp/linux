# =============================================================
# RocketMQ 5.3.2 完整部署 All-in-One
# 集群：3主3从 + Controller 自动选主 + Proxy + Dashboard
# namespace：middleware
# 镜像：hub.wishfoxs.com:6443/middleware
# 存储：longhorn 100Gi/broker
# 部署顺序：直接 kubectl apply -f rocketmq-all-in-one.yaml
# =============================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: middleware

# -----------------------------------------------
# NameServer 配置
# -----------------------------------------------
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: namesrv-config
  namespace: middleware
data:
  namesrv.conf: |
    enableControllerInNamesrv=true
    controllerDLegerGroup=dledger-controller
    controllerDLegerPeers=n0-namesrv-0.namesrv-headless.middleware.svc.cluster.local:9878;n1-namesrv-1.namesrv-headless.middleware.svc.cluster.local:9878;n2-namesrv-2.namesrv-headless.middleware.svc.cluster.local:9878
    controllerStorePath=/home/rocketmq/logs/controller

---
apiVersion: v1
kind: Service
metadata:
  name: namesrv-headless
  namespace: middleware
spec:
  clusterIP: None
  selector:
    app: namesrv
  ports:
    - name: namesrv
      port: 9876
    - name: controller
      port: 9877
    - name: raft
      port: 9878

---
apiVersion: v1
kind: Service
metadata:
  name: namesrv
  namespace: middleware
spec:
  selector:
    app: namesrv
  ports:
    - name: namesrv
      port: 9876
      targetPort: 9876

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: namesrv
  namespace: middleware
spec:
  serviceName: namesrv-headless
  replicas: 3
  selector:
    matchLabels:
      app: namesrv
  template:
    metadata:
      labels:
        app: namesrv
    spec:
      securityContext:
        runAsUser: 0
        fsGroup: 0
      initContainers:
        - name: init-config
          image: hub.wishfoxs.com:6443/middleware/rocketmq:5.3.2
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          command:
            - /bin/sh
            - -c
            - |
              INDEX=${POD_NAME##*-}
              cp /tmp/namesrv-tpl/namesrv.conf /etc/rocketmq/namesrv.conf
              echo "controllerDLegerSelfId=n${INDEX}" >> /etc/rocketmq/namesrv.conf
              mkdir -p /home/rocketmq/logs/rocketmqlogs
              mkdir -p /home/rocketmq/logs/controller
              chmod -R 777 /home/rocketmq/logs
              echo "--- namesrv.conf ---"
              cat /etc/rocketmq/namesrv.conf
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: namesrv-conf-tpl
              mountPath: /tmp/namesrv-tpl
            - name: namesrv-conf-dynamic
              mountPath: /etc/rocketmq
            - name: logs
              mountPath: /home/rocketmq/logs
      containers:
        - name: namesrv
          image: hub.wishfoxs.com:6443/middleware/rocketmq:5.3.2
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          command: ["sh", "mqnamesrv", "-c", "/etc/rocketmq/namesrv.conf"]
          env:
            - name: JAVA_OPT
              value: "-Xms1g -Xmx1g"
          ports:
            - containerPort: 9876
              name: namesrv
            - containerPort: 9877
              name: controller
            - containerPort: 9878
              name: raft
          volumeMounts:
            - name: namesrv-conf-dynamic
              mountPath: /etc/rocketmq
            - name: logs
              mountPath: /home/rocketmq/logs
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: 9876
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9876
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: namesrv-conf-tpl
          configMap:
            name: namesrv-config
        - name: namesrv-conf-dynamic
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: namesrv
                topologyKey: kubernetes.io/hostname
  volumeClaimTemplates:
    - metadata:
        name: logs
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 10Gi

# -----------------------------------------------
# Broker 配置
# -----------------------------------------------
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: broker-a-config
  namespace: middleware
data:
  broker.conf: |
    brokerClusterName=DefaultCluster
    brokerName=broker-a
    listenPort=10911
    enableControllerMode=true
    controllerAddr=namesrv-0.namesrv-headless.middleware.svc.cluster.local:9878;namesrv-1.namesrv-headless.middleware.svc.cluster.local:9878;namesrv-2.namesrv-headless.middleware.svc.cluster.local:9878
    brokerRole=SLAVE
    flushDiskType=SYNC_FLUSH
    storePathRootDir=/home/rocketmq/store
    storePathCommitLog=/home/rocketmq/store/commitlog
    autoCreateTopicEnable=false
    autoCreateSubscriptionGroup=false
    fileReservedTime=72
    deleteWhen=04
    diskSpaceCleanForciblyRatio=0.85
    diskSpaceWarningLevelRatio=0.90
    sendMessageThreadPoolNums=128
    pullMessageThreadPoolNums=128

---
