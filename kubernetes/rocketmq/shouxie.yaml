# -----------------------------------------------
# Proxy
# -----------------------------------------------
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy
  namespace: middleware
spec:
  replicas: 3
  selector:
    matchLabels:
      app: proxy
  template:
    metadata:
      labels:
        app: proxy
    spec:
      containers:
        - name: proxy
          image: hub.wishfoxs.com:6443/middleware/rocketmq:5.3.2
          imagePullPolicy: IfNotPresent
          command: ["sh", "mqproxy"]
          env:
            - name: NAMESRV_ADDR
              value: "namesrv-0.namesrv-headless.middleware.svc.cluster.local:9876;namesrv-1.namesrv-headless.middleware.svc.cluster.local:9876;namesrv-2.namesrv-headless.middleware.svc.cluster.local:9876"
            - name: JAVA_OPT
              value: "-Xms1g -Xmx1g"
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8081
              name: grpc
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: proxy
                topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: proxy
  namespace: middleware
spec:
  selector:
    app: proxy
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 8081
      targetPort: 8081

