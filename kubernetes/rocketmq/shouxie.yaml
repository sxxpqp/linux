apiVersion: v1
kind: Service
metadata:
  name: broker-a-headless
  namespace: middleware
spec:
  clusterIP: None
  selector:
    app: broker-a
  ports:
    - name: broker
      port: 10911
    - name: broker-vip
      port: 10909

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: broker-a
  namespace: middleware
spec:
  serviceName: broker-a-headless
  replicas: 2
  selector:
    matchLabels:
      app: broker-a
  template:
    metadata:
      labels:
        app: broker-a
        broker-group: rocketmq-broker
    spec:
      securityContext:
        runAsUser: 0
        fsGroup: 0
      initContainers:
        - name: init-store
          image: hub.wishfoxs.com:6443/middleware/rocketmq:5.3.2
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          command:
            - /bin/sh
            - -c
            - |
              mkdir -p /home/rocketmq/store/commitlog
              mkdir -p /home/rocketmq/store/consumequeue
              mkdir -p /home/rocketmq/store/index
              mkdir -p /home/rocketmq/store/config
              mkdir -p /home/rocketmq/logs/rocketmqlogs
              chmod -R 777 /home/rocketmq/store
              chmod -R 777 /home/rocketmq/logs
              echo "init done"
          volumeMounts:
            - name: store
              mountPath: /home/rocketmq/store
            - name: logs
              mountPath: /home/rocketmq/logs
      containers:
        - name: broker
          image: hub.wishfoxs.com:6443/middleware/rocketmq:5.3.2
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsUser: 0
          command: ["sh", "mqbroker", "-c", "/etc/rocketmq/broker.conf"]
          env:
            - name: NAMESRV_ADDR
              value: "namesrv-0.namesrv-headless.middleware.svc.cluster.local:9876;namesrv-1.namesrv-headless.middleware.svc.cluster.local:9876;namesrv-2.namesrv-headless.middleware.svc.cluster.local:9876"
            - name: JAVA_OPT
              value: "-Xms8g -Xmx8g -Xmn4g -XX:+UseG1GC -XX:G1HeapRegionSize=16m -XX:MaxGCPauseMillis=200"
          ports:
            - containerPort: 10911
              name: broker
            - containerPort: 10909
              name: broker-vip
          volumeMounts:
            - name: broker-conf
              mountPath: /etc/rocketmq/broker.conf
              subPath: broker.conf
            - name: store
              mountPath: /home/rocketmq/store
            - name: logs
              mountPath: /home/rocketmq/logs
          resources:
            requests:
              cpu: 2000m
              memory: 8Gi
            limits:
              cpu: 4000m
              memory: 12Gi
          readinessProbe:
            tcpSocket:
              port: 10911
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 10911
            initialDelaySeconds: 60
            periodSeconds: 15
      volumes:
        - name: broker-conf
          configMap:
            name: broker-a-config
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: broker-a
              topologyKey: kubernetes.io/hostname
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    broker-group: rocketmq-broker
                topologyKey: kubernetes.io/hostname
  volumeClaimTemplates:
    - metadata:
        name: store
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 100Gi
    - metadata:
        name: logs
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: longhorn
        resources:
          requests:
            storage: 10Gi

