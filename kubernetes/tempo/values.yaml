# ==========================================
# Grafana Tempo — 分布式 Trace 存储（生产环境）
# helm install tempo grafana/tempo -n observability --values values.yaml
# ==========================================

tempo:
  replicas: 3                       # 3 副本高可用

  # OTLP 接收端
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  # S3 共享存储（MinIO）
  storage:
    trace:
      backend: s3
      s3:
        bucket: tempo-traces
        endpoint: minio.observability:9000
        access_key: minioadmin
        secret_key: minioadmin
        insecure: true
      wal:
        path: /var/tempo/wal

# Service 端口
service:
  type: ClusterIP
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: http           # Grafana 查询端口
      port: 3200
      targetPort: 3200
