apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: kafka-cluster
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.2.0
    metadataVersion: 4.2-IV0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: nodeport
        port: 9094
        type: nodeport
        tls: false
        configuration:
          bootstrap:
            nodePort: 32092
          brokers:
            - broker: 0
              nodePort: 32093
              advertisedHost: 192.168.100.12  # k8sw2
            - broker: 1
              nodePort: 32096
              advertisedHost: 192.168.100.27  # k8sw3
            - broker: 2
              nodePort: 32095
              advertisedHost: 192.168.100.28  # k8sw4
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      auto.create.topics.enable: "false"
      log.retention.hours: 168
      num.partitions: 6
      compression.type: lz4
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: kafka
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  replicas: 3
  roles:
    - broker
    - controller
  storage:
    type: persistent-claim
    size: 100Gi
    class: longhorn
    deleteClaim: false
  resources:
    requests:
      memory: 4Gi
      cpu: "1"
    limits:
      memory: 8Gi
      cpu: "4"
  jvmOptions:
    -Xms: 2048m
    -Xmx: 4096m
  template:
    pod:
      nodeSelector:
        kafka: "true"      # 固定只调度到打了标签的节点
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  strimzi.io/cluster: kafka-cluster
                  strimzi.io/kind: KafkaNodePool
              topologyKey: kubernetes.io/hostname
---
# 先给节点打标签
kubectl label node k8sw1.sohuglobal kafka=true
kubectl label node k8sw3.sohuglobal kafka=true
kubectl label node k8sw4.sohuglobal kafka=true



