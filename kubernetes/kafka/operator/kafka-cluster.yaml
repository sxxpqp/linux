# Kafka 集群 — 标准 internal 部署(常用方式,集群内访问)
# 适用:Kafka Connect / Debezium / Redis Sink / 业务 Pod 都在集群内,连 kafka-cluster-kafka-bootstrap:9092
# 3 节点 → KRaft 合并模式(broker+controller 同 pool),每节点 1 个;要集群外访问才用 deploy.yaml(nodeport)
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: kafka
  namespace: kafka
  labels:
    strimzi.io/cluster: kafka-cluster
spec:
  replicas: 3
  roles:
    - broker
    - controller
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 100Gi
        # class: longhorn
        kraftMetadata: shared
        deleteClaim: false
  resources:
    requests:
      memory: 4Gi
      cpu: "1"
    limits:
      memory: 8Gi
      cpu: "4"
  jvmOptions:
    -Xms: 2048m
    -Xmx: 4096m
  template:
    pod:
      affinity:
        # ⚠ Strimzi pod template 没有 nodeSelector 字段,节点选择必须用 nodeAffinity
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kafka
                    operator: In
                    values:
                      - "true"          # 只调度到 kubectl label node ... kafka=true 的节点
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  # ⚠ 只匹配 broker pod。别用 strimzi.io/cluster(太宽:entity-operator 也带这标签,
                  #    反亲和对称 → entity-operator 被所有 broker 节点拒绝,无处调度 Pending)
                  strimzi.io/name: kafka-cluster-kafka
              topologyKey: kubernetes.io/hostname   # 每节点最多 1 个 broker
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka-cluster
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.2.0
    metadataVersion: 4.2-IV1
    listeners:
      # 标准:集群内访问,不暴露到 k8s 外
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      default.replication.factor: 3
      min.insync.replicas: 2
      auto.create.topics.enable: "false"
      log.retention.hours: 168
      num.partitions: 6
      compression.type: lz4
  entityOperator:
    topicOperator: {}
    userOperator: {}
