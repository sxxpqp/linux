loki:
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  ingester:
    chunk_encoding: snappy
  querier:
    # Default is 4, if you have enough memory and CPU you can increase, reduce if OOMing
    max_concurrent: 4 
  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true

deploymentMode: SimpleScalable
auth_enabled: false
backend:
  replicas: 1
  persistence:
    storageClass: local-path
    size: 50Gi
read:
  replicas: 1
  persistence:
    storageClass: local-path
    size: 20Gi
write:
  replicas: 1
  persistence:
    storageClass: local-path
    size: 50Gi

# Enable minio for storage
minio:
  enabled: true
  persistence:
    storageClass: local-path
    size: 100Gi
limits_config:
    retention_period: 8760h # 24小时 * 365天 = 8760h

# 2. 开启清理器（必须开启，否则 retention_period 不生效）
compactor:
  retention_enabled: true
  working_directory: /var/loki/retention
  # 建议定期清理的间隔
  compaction_interval: 10m
  # 确认删除的延迟，防止误删
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

# 3. 存储有效期（如果使用的是内部存储，需确保 index 的有效期大于 retention）
chunk_store_config:
  max_look_back_period: 8760h  

gateway:
  service:
    type: LoadBalancer