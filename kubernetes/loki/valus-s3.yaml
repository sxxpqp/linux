loki:
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  ingester:
    chunk_encoding: snappy
  querier:
    # Default is 4, if you have enough memory and CPU you can increase, reduce if OOMing
    max_concurrent: 4 
  pattern_ingester:
    enabled: true
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
  storage:
    type: s3
    s3:  
      endpoint: 58.49.56.57:8060
      accessKeyId: oxezmsj6gzy3p2mx7amp
      secretAccessKey: md5ba21fsxwwb8w25d0xmm632wjh9pjpqsz4mqni
      insecure: true
      http_config:
        insecure_skip_verify: true  
      s3ForcePathStyle: true   
    bucketNames:
      chunks: testlog
      index: testlog
      ruler: testlog
  limits_config:
    retention_period: 8760h
    reject_old_samples_max_age: 8760h       
  compactor:
    retention_enabled: true
    delete_request_store: s3  
    working_directory: /var/loki/retention
  # 建议定期清理的间隔
    compaction_interval: 10m
  # 确认删除的延迟，防止误删
    retention_delete_delay: 2h
    retention_delete_worker_count: 150      
deploymentMode: SimpleScalable
auth_enabled: false
backend:
  replicas: 2 
read:
  replicas: 2 
write:
  replicas: 3 # To ensure data durability with replication

# Enable minio for storage
minio:
  enabled: false
limits_config:
    retention_period: 8760h # 24小时 * 365天 = 8760h

# 2. 开启清理器（必须开启，否则 retention_period 不生效）
compactor:
  retention_enabled: true
  working_directory: /var/loki/retention
  # 建议定期清理的间隔
  compaction_interval: 10m
  # 确认删除的延迟，防止误删
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

# 3. 存储有效期（如果使用的是内部存储，需确保 index 的有效期大于 retention）
chunk_store_config:
  max_look_back_period: 8760h  

gateway:
  service:
    type: LoadBalancer