# ==========================================
# 1. 全局及 Loki 核心参数配置
# ==========================================
deploymentMode: SimpleScalable

loki:
  # 关键：多租户关闭开关，必须在 loki 子层级下才生效！
  auth_enabled: false

  # 哈希环副本因子（必须 ≤ write 节点数，单节点设为 1）
  common:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  ingester:
    chunk_encoding: snappy

  querier:
    # 默认是 4，如果内存和 CPU 足够可以增加，如果 OOM 则调小
    max_concurrent: 4 

  pattern_ingester:
    enabled: true

  # 已合并所有限制参数
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true
    retention_period: 8760h             # 365天存储有效期
    reject_old_samples_max_age: 8760h

  # 已合并所有清理器参数
  compactor:
    retention_enabled: true
    delete_request_store: s3  
    working_directory: /var/loki/retention
    compaction_interval: 10m            # 定期清理的间隔
    retention_delete_delay: 2h          # 确认删除的延迟
    retention_delete_worker_count: 150      

  # 存储回溯有效期
  chunk_store_config:
    max_look_back_period: 8760h  

  # 对象存储连接配置
  storage:
    type: s3
    s3:  
      endpoint: minio.observability:9000
      accessKeyId: minioadmin
      secretAccessKey: minioadmin
      insecure: true
      http_config:
        insecure_skip_verify: true  
      s3ForcePathStyle: true   
    bucketNames:
      chunks: testlog
      index: testlog
      ruler: testlog

# ==========================================
# 2. 组件副本、持久化及网关配置（最外层）
# ==========================================
backend:
  replicas: 1
  persistence:
    storageClass: local-path
    size: 50Gi
read:
  replicas: 1
  persistence:
    storageClass: local-path
    size: 20Gi
write:
  replicas: 1
  persistence:
    storageClass: local-path
    size: 50Gi

# 关闭 Chart 自带的内部 minio 存储
minio:
  enabled: false

# Loki Nginx 网关
gateway:
  service:
    type: LoadBalancer
