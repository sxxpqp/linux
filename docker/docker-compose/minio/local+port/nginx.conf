events {
    worker_connections 1024;
}

http {
    client_max_body_size 0;

    # MinIO API
    server {
        listen 8443 ssl;
        server_name ihome.sxxpqp.top *.ihome.sxxpqp.top;

        ssl_certificate     /etc/nginx/ssl/ihome.sxxpqp.top.crt;
        ssl_certificate_key /etc/nginx/ssl/ihome.sxxpqp.top.key;

        ignore_invalid_headers off;

        location / {
            proxy_pass http://127.0.0.1:9000;
            proxy_set_header Host              $http_host;   # 保留端口，S3 签名必须
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering         off;
            proxy_request_buffering off;
        }
    }

    # MinIO Console
    server {
        listen 8443 ssl;
        server_name console.ihome.sxxpqp.top;

        ssl_certificate     /etc/nginx/ssl/ihome.sxxpqp.top.crt;
        ssl_certificate_key /etc/nginx/ssl/ihome.sxxpqp.top.key;

        location / {
            proxy_pass http://127.0.0.1:9001;
            proxy_set_header Host              $http_host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 支持（Console 必须）
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # HTTP 跳转 HTTPS
    server {
        listen 80;
        server_name ihome.sxxpqp.top *.ihome.sxxpqp.top console.ihome.sxxpqp.top;
        return 301 https://$host$request_uri;
    }
}



