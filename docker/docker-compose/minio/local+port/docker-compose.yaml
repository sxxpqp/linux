version: '3'

networks:
  minio-net:
    driver: bridge

services:
  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: minio
    network_mode: host          # host 模式，直接用宿主机网络
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: Xl123456
      MINIO_DOMAIN: ihome.sxxpqp.top
      MINIO_SERVER_URL: http://localhost:9000          # Console 内部认证走本地
      MINIO_BROWSER_REDIRECT_URL: https://console.ihome.sxxpqp.top:8443
    command: server /data --console-address :9001 --address :9000
    restart: always
    volumes:
      - ./data:/data
      - ./certs:/root/.minio/certs
    logging:
      driver: json-file
      options:
        max-size: 5M
        max-file: "10"

  nginx:
    image: nginx:alpine
    container_name: nginx-minio
    network_mode: host          # host 模式，直接监听 8443
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - minio
    logging:
      driver: json-file
      options:
        max-size: 5M
        max-file: "10"



